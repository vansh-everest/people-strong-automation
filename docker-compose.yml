services:
  worker:
    build: .
    ports:
      - "8080:8080"
    environment:
      WORKER_SECRET: ${WORKER_SECRET}
      PEOPLESTRONG_USER: ${PEOPLESTRONG_USER}
      PEOPLESTRONG_PASS: ${PEOPLESTRONG_PASS}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      HEADLESS: "true"
    volumes:
      - ./storage:/app/storage
