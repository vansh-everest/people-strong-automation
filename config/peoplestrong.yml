# ── PeopleStrong portal config (Everest tenant) ──────────────────────────────
# Login is a classic HTML/JSF page; after login the landing app is Flutter/CanvasKit
# (NOT scrapable). The scrapable PrimeFaces task app is reached via the deeplink
# bridge below, which establishes the legacy JSF session and redirects to home.jsf.

BASE_URL: "https://everestfleet.peoplestrong.com"
# The site root 302-redirects to /altLogin.jsf (the HTML login form).
LOGIN_URL: "https://everestfleet.peoplestrong.com/"

# Login form selectors (verified live on altLogin.jsf).
USERNAME_SELECTOR: 'input[id*="username"]'
PASSWORD_SELECTOR: 'input[id="loginForm:password"]'
LOGIN_BUTTON_SELECTOR: 'button[id*="loginButton"]'

# Deeplink bridge: open this in a NEW TAB after login. It hands the Keycloak/oneweb
# session into the legacy JSF app and redirects to home.jsf?cid=<n>#/home (the
# PrimeFaces task dashboard). Using the bridge avoids hardcoding a session-bound cid.
TASK_PAGE_URL: "https://everestfleet.peoplestrong.com/secureSloginDeeplinkKeycloak.jsf"

# DOM marker present on the HTML login form → used to detect we are NOT logged in.
LOGIN_FORM_MARKER: 'input[id*="username"]'
# DOM marker present on the legacy JSF task dashboard once it has loaded.
TASK_PAGE_MARKER: ".mytasks_icon"

# ── Downstream task/claim selectors (PrimeFaces) ─────────────────────────────
# Carried over from the original spec; to be verified against the live task list
# in the next step. PrimeFaces row ids contain changing numbers — always use
# substring id selectors (a[id*=...]), never hardcoded indices.
TASKS_ICON: ".mytasks_icon"
QUEUE_TITLE_TEXT: "Reimbursement Claim Requests"
TASK_LINK: "a[id*=ApproveRejectButton]"
EXPENSE_HEAD_LINK: "a[id*=tableId]"
# Attachment download links live in the claim's PrimeFaces datalist
# (multiDataforUpload:attachmentsList) as one <a> per file ("filename (size)").
ATTACHMENT_LINK: '[id*="attachmentsList"] li a'
TOTAL_CLAIMED_LABEL: "Total Claimed Amount:"
# Opening a claim replaces the task list; this returns to it (the detail's "BACK").
BACK_BUTTON: 'button[id*="cancel"]'

# Default stage filter (only rows whose text matches are processed).
STAGE_FILTER: "Finance Manager Approval"
